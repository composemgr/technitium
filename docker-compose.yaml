# nginx proxy address - http://172.17.0.1:61118

name: technitium
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: casjaysdevdocker/technitium:latest
    container_name: technitium-app
    domainname: ${BASE_DOMAIN_NAME:-example.com}
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      - 'DNS_SERVER_RECURSION=Allow'
      - 'DNS_SERVER_ENABLE_BLOCKING=true'
      - 'DNS_SERVER_FORWARDER_PROTOCOL=Tcp'
      - 'DNS_SERVER_LOG_USING_LOCAL_TIME=true'
      - 'DNS_SERVER_WEB_SERVICE_HTTP_PORT=5380'
      - 'DNS_SERVER_WEB_SERVICE_HTTPS_PORT=5381'
      - 'DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT=true'
      - 'DNS_SERVER_ADMIN_PASSWORD=${APP_ADMIN_PASS:-changeme_admin_password}'
      - 'DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS=true'
      - 'DNS_SERVER_DOMAIN=${BASE_DOMAIN_NAME:-HOSTNAME}'
      - 'DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP=true'
      - 'DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT=false'
      - 'DNS_SERVER_FORWARDERS=82.29.128.43, 1.1.1.1, 8.8.8.8'
      - 'CONTAINER_NAME=technitium-app'
      - 'HOSTNAME=${BASE_HOST_NAME:-$HOSTNAME}'
    ports:
      - '53:53/udp'
      - '53:53/tcp'
      - '853:853/udp'
      - '853:853/tcp'
      - '172.17.0.1:8053:8053/tcp' # DNS-over-HTTP
      - '172.17.0.1:61118:5380/tcp' # DNS web console HTTP
      - '172.17.0.1:61119:5381/tcp' # DNS web console HTTPS
    volumes:
      - './volumes/config/technitium:/etc/dns'
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65000
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://technitium-app:5380'
      - 'cloudflare.hostname=technitium.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.technitium-app.entrypoints=http'
      - 'traefik.http.routers.technitium-app-secure.tls=true'
      - 'traefik.http.routers.technitium-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.technitium-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.technitium-app.middlewares=technitium-app-https-redirect'
      - 'traefik.http.routers.technitium-app-secure.entrypoints=https'
      - 'traefik.http.routers.technitium-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.technitium-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.technitium-app-secure.service=technitium-app'
      - 'traefik.http.services.technitium-app.loadbalancer.server.port=5380'
    networks:
      - technitium
      - proxy
      - cloudflare

networks:
  technitium:
    name: technitium
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
